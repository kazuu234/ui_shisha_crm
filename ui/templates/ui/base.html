{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{% endblock %} | Shisha CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'ui/css/output.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body class="bg-bg-base text-text-primary font-sans {% block body_class %}{% endblock %}">
  {% block body %}{% endblock %}

  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script>
    document.body.addEventListener("htmx:configRequest", function (evt) {
      evt.detail.headers["X-CSRFToken"] =
        document.querySelector("[name=csrfmiddlewaretoken]")?.value ||
        document.cookie.match(/csrftoken=([^;]+)/)?.[1] ||
        "";
    });
  </script>
  <script>
    document.body.addEventListener("htmx:beforeSwap", function (evt) {
      if (evt.detail.xhr.status === 422) {
        evt.detail.shouldSwap = true;
        evt.detail.isError = false;
      }
    });
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14/dist/cdn.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
