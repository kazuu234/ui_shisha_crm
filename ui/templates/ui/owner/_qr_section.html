<div class="space-y-3">
  <h2 class="text-[17px] font-bold text-text-primary">QR コード</h2>
  {% if latest_qr_token %}
    {% if qr_image %}
      <div>
        <img src="{{ qr_image }}" alt="QR コード" class="w-48 h-48">
      </div>
    {% endif %}
    <p class="text-[15px] text-text-primary break-all">
      URL:
      <a href="{{ qr_url }}" target="_blank" rel="noopener noreferrer" class="text-accent underline hover:text-accent-hover">
        {{ qr_url }}
      </a>
    </p>
    <p class="text-sm text-text-secondary">
      有効期限: {{ latest_qr_token.expires_at|date:"Y/m/d H:i" }}
    </p>
  {% else %}
    <p class="text-[15px] text-text-secondary">QR トークンがありません</p>
  {% endif %}

  <div id="qr-email-status" class="min-h-[1px]"></div>

  <div class="flex flex-wrap items-center gap-3">
    <button
      type="button"
      hx-post="{% url 'owner:staff-qr-issue' staff.pk %}"
      hx-target="#qr-section"
      hx-swap="innerHTML"
      class="inline-flex items-center justify-center rounded-sm px-4 py-2 text-sm font-medium bg-accent text-text-inverse hover:bg-accent-hover"
    >
      QR 再発行
    </button>
    {% if latest_qr_token %}
      <button
        type="button"
        onclick="window.print()"
        class="inline-flex items-center justify-center rounded-sm px-4 py-2 text-sm font-medium border border-border-default text-text-primary bg-bg-surface hover:bg-bg-surface-alt"
      >
        印刷
      </button>
    {% endif %}
    {% if staff.email %}
      <button
        type="button"
        hx-post="{% url 'owner:staff-qr-email' staff.pk %}"
        hx-target="#qr-email-status"
        hx-swap="innerHTML"
        class="inline-flex items-center justify-center rounded-sm px-4 py-2 text-sm font-medium border border-border-default text-text-primary bg-bg-surface hover:bg-bg-surface-alt"
      >
        QR をメール送信
      </button>
    {% else %}
      <button
        type="button"
        disabled
        aria-disabled="true"
        class="inline-flex items-center justify-center rounded-sm px-4 py-2 text-sm font-medium border border-border-default text-text-muted bg-bg-surface-alt cursor-not-allowed opacity-70"
      >
        QR をメール送信
      </button>
      <p class="text-sm text-text-secondary w-full sm:w-auto">
        メールアドレスが未設定です。スタッフ編集から設定してください
      </p>
    {% endif %}
  </div>
</div>
