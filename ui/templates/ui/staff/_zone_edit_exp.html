{% load static %}

<div id="zone-shisha_experience" class="p-4">
  {% if error %}
    <div class="rounded-sm p-2 mb-2 bg-error-subtle text-error text-sm">
      <p>{{ error }}</p>
    </div>
  {% endif %}

  <div x-data="{ open: false }">
    <div class="cursor-pointer" @click="open = !open">
      <span class="text-text-secondary text-sm block">{{ config.label }}</span>
      {% if customer.shisha_experience %}
        <span class="font-medium text-text-primary text-[17px] block mt-0.5">{{ customer.shisha_experience_display }}</span>
      {% else %}
        <span class="text-text-muted text-xs block mt-1">タップして選択 ▸</span>
      {% endif %}
    </div>

    <div x-show="open" x-transition x-cloak class="mt-3 flex flex-wrap gap-2" style="display: none;">
      {% for value, label in config.choices %}
        <button
          type="button"
          hx-patch="/s/customers/{{ customer.id }}/edit/field/"
          hx-vals='{"field": "shisha_experience", "value": "{{ value }}"}'
          hx-target="#zone-shisha_experience"
          hx-swap="outerHTML"
          class="inline-flex items-center rounded-full border px-3 py-1.5 text-sm transition-colors
            {% if customer.shisha_experience == value %}
              border-accent bg-accent-light text-accent font-medium
            {% else %}
              border-border-default bg-bg-surface text-text-primary hover:border-accent
            {% endif %}"
        >
          {{ label }}
        </button>
      {% endfor %}
      {% if customer.shisha_experience %}
        <button
          type="button"
          hx-patch="/s/customers/{{ customer.id }}/edit/field/"
          hx-vals='{"field": "shisha_experience", "value": ""}'
          hx-target="#zone-shisha_experience"
          hx-swap="outerHTML"
          class="inline-flex items-center rounded-full border border-border-default px-3 py-1.5 text-sm text-text-secondary"
        >
          クリア
        </button>
      {% endif %}
    </div>
  </div>
</div>
