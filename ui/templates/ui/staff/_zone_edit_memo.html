{% load static %}

<div id="zone-memo" class="p-4">
  {% if error %}
    <div class="rounded-sm p-2 mb-2 bg-error-subtle text-error text-sm">
      <p>{{ error }}</p>
    </div>
  {% endif %}

  <div x-data="{ open: false, val: '{{ customer.memo|default_if_none:""|escapejs }}' }">
    <div
      class="cursor-pointer"
      @click="open = !open; if (open) $nextTick(() => $refs.memoInput.focus())"
    >
      <span class="text-text-secondary text-sm block">{{ config.label }}</span>
      {% if customer.memo %}
        <span class="font-medium text-text-primary text-[17px] block mt-0.5">{{ customer.memo|truncatechars:30 }}</span>
      {% else %}
        <span class="text-text-muted text-xs block mt-1">タップして入力 ▸</span>
      {% endif %}
    </div>

    <div x-show="open" x-transition x-cloak class="mt-2" style="display: none;">
      <textarea
        x-model="val"
        x-ref="memoInput"
        placeholder="{{ config.placeholder }}"
        rows="4"
        class="w-full border border-border-default rounded-sm p-3 mt-1 text-[17px] bg-bg-surface text-text-primary"
      ></textarea>
      <div class="flex gap-2 mt-2">
        <button
          type="button"
          hx-patch="/s/customers/{{ customer.id }}/edit/field/"
          :hx-vals="JSON.stringify({field: 'memo', value: val})"
          hx-target="#zone-memo"
          hx-swap="outerHTML"
          class="flex-1 py-2 rounded-md bg-accent text-text-inverse font-medium text-[17px]"
        >
          保存
        </button>
        <button type="button" @click="open = false" class="px-4 py-2 rounded-md border border-border-default text-text-secondary text-sm">
          キャンセル
        </button>
      </div>
    </div>
  </div>
</div>
