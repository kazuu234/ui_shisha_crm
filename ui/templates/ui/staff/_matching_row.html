{% load static %}

<div
  id="matching-row-{{ row.id }}"
  x-data="{ open: false }"
  class="border-b border-border-default last:border-b-0"
>
  <div
    @click="open = !open; if (open) { $nextTick(() => htmx.trigger($refs.candidateArea, 'loadCandidates')) }"
    class="py-3 px-5 cursor-pointer"
  >
    <div class="flex items-center justify-between">
      <div>
        <span class="font-medium">{{ row.business_date|date:"n/j" }}</span>
        <span class="text-text-secondary text-sm ml-2">No.{{ row.receipt_no }}</span>
      </div>
      <span class="text-text-muted" x-text="open ? '▾' : '▸'"></span>
    </div>
    {% if row.csv_customer_name %}
      <p class="text-text-secondary text-sm mt-1">
        CSV 顧客名: {{ row.csv_customer_name }}
      </p>
    {% endif %}
  </div>

  <div
    x-show="open"
    x-transition
    x-ref="candidateArea"
    hx-get="{% url 'staff:matching-candidates' row.id %}"
    hx-trigger="loadCandidates"
    hx-swap="innerHTML"
    class="px-5 pb-3"
  >
    <div class="text-center text-text-muted py-4">
      <p>候補を読み込み中...</p>
    </div>
  </div>
</div>
